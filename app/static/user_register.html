<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyteam 用户注册</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Flyteam 用户注册</h1>
    <p>创建普通用户账号。用户 ID 只能包含字母、数字、下划线和短横线。</p>
    <form id="userRegisterForm">
      <input id="nickname" autocomplete="nickname" placeholder="昵称" required />
      <input id="userId" autocomplete="username" placeholder="用户 ID，例如 grand" required />
      <input id="password" type="password" autocomplete="new-password" placeholder="密码，至少 8 位" required />
      <div class="login-row">
        <a class="back-link" href="/user-login">已有账号，去登录</a>
        <button type="submit">注册</button>
      </div>
    </form>
    <div id="userRegisterMsg" class="login-msg"></div>
  </main>
  <script src="/static/user_register.js"></script>
</body>
</html>
